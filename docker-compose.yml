version: '3.8'

services:
  bustracker:
    build: .
    container_name: hctb-bustracker
    restart: unless-stopped
    ports:
      - "5005:5000"
    environment:
      - TZ=America/New_York
    env_file:
      - .env
    volumes:
      # Keep the subscription file persistent across container restarts
      - ./subscriptions.json:/app/subscriptions.json
